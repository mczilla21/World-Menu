<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="dbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#FFE8B0"/>
    </linearGradient>
    <linearGradient id="dbowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5C4033"/>
      <stop offset="100%" stop-color="#3E2723"/>
    </linearGradient>
    <linearGradient id="dbroth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="100%" stop-color="#6B4F10"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="200" r="190" fill="url(#dbg)"/>

  <!-- Steam -->
  <g opacity="0.25">
    <path d="M150,130 Q155,105 148,80" stroke="#8B6914" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M150,130 Q155,105 148,80;M150,130 Q145,100 152,75;M150,130 Q155,105 148,80" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M250,130 Q245,105 252,80" stroke="#8B6914" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M250,130 Q245,105 252,80;M250,130 Q255,100 248,75;M250,130 Q245,105 252,80" dur="3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Bowl body (dark special broth) -->
  <path d="M75,190 Q75,330 200,350 Q325,330 325,190 Z" fill="url(#dbowl)" stroke="#2C1810" stroke-width="2"/>

  <!-- Dark broth -->
  <path d="M85,190 Q85,310 200,325 Q315,310 315,190 Z" fill="url(#dbroth)" opacity="0.85"/>

  <!-- Broth shimmer -->
  <ellipse cx="180" cy="220" rx="40" ry="15" fill="#A67C3D" opacity="0.2"/>

  <!-- Duck pieces -->
  <g>
    <!-- Duck leg -->
    <ellipse cx="170" cy="195" rx="28" ry="16" fill="#8B4513" stroke="#5C3317" stroke-width="1" transform="rotate(-10,170,195)"/>
    <ellipse cx="170" cy="192" rx="22" ry="12" fill="#A0522D" transform="rotate(-10,170,192)"/>
    <!-- Bone hint -->
    <line x1="145" y1="200" x2="138" y2="205" stroke="#DEB887" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Duck slices -->
  <g transform="translate(230,185) rotate(15)">
    <rect x="0" y="0" width="35" height="8" rx="3" fill="#A0522D" stroke="#6B3A1F" stroke-width="0.5"/>
    <rect x="3" y="10" width="32" height="8" rx="3" fill="#8B4513" stroke="#6B3A1F" stroke-width="0.5"/>
    <rect x="6" y="20" width="28" height="7" rx="3" fill="#A0522D" stroke="#6B3A1F" stroke-width="0.5"/>
  </g>

  <!-- Noodles in broth -->
  <g stroke="#F5DEB3" fill="none" stroke-width="2.5" stroke-linecap="round" opacity="0.7">
    <path d="M110,220 Q150,210 200,220 Q250,230 290,220"/>
    <path d="M120,235 Q160,225 200,235 Q240,245 280,235"/>
    <path d="M115,250 Q155,240 195,250 Q235,260 275,250"/>
  </g>

  <!-- Bean sprouts -->
  <g fill="#E8E0D0" opacity="0.6">
    <ellipse cx="150" cy="210" rx="6" ry="2" transform="rotate(30,150,210)"/>
    <ellipse cx="250" cy="205" rx="5" ry="2" transform="rotate(-20,250,205)"/>
    <ellipse cx="190" cy="200" rx="5" ry="2" transform="rotate(10,190,200)"/>
  </g>

  <!-- Green onion -->
  <circle cx="210" cy="185" r="4" fill="#4CAF50" opacity="0.7"/>
  <circle cx="155" cy="180" r="3" fill="#66BB6A" opacity="0.7"/>
  <circle cx="245" cy="190" r="3.5" fill="#4CAF50" opacity="0.6"/>

  <!-- Cilantro -->
  <g transform="translate(195,175)">
    <path d="M0,0 Q-4,-7 -1,-12 Q0,-8 1,-12 Q4,-7 0,0" fill="#2E7D32" opacity="0.6"/>
  </g>

  <!-- Bowl rim -->
  <ellipse cx="200" cy="190" rx="130" ry="20" fill="#5C4033" stroke="#2C1810" stroke-width="2"/>
  <ellipse cx="200" cy="188" rx="125" ry="16" fill="#6B4F3A" stroke="none"/>

  <!-- Cute duck swimming in bowl -->
  <g transform="translate(200,170)">
    <!-- Duck body -->
    <ellipse cx="0" cy="5" rx="18" ry="12" fill="#FFD54F"/>
    <!-- Duck head -->
    <circle cx="-15" cy="-5" r="11" fill="#FFD54F"/>
    <!-- Eye -->
    <circle cx="-18" cy="-7" r="2.5" fill="#333"/>
    <circle cx="-17.5" cy="-7.5" r="1" fill="#fff"/>
    <!-- Beak -->
    <path d="M-26,-4 L-30,-2 L-26,0 Z" fill="#FF8F00"/>
    <!-- Wing -->
    <ellipse cx="5" cy="2" rx="10" ry="7" fill="#FFC107" transform="rotate(-15,5,2)"/>
    <!-- Blush -->
    <circle cx="-12" cy="0" r="3" fill="#FF8A80" opacity="0.4"/>
    <!-- Duck bobbing -->
    <animateTransform attributeName="transform" type="translate" values="200,170;200,167;200,170" dur="2s" repeatCount="indefinite"/>
  </g>

  <!-- Small rubber duck friend -->
  <g transform="translate(135,175)" opacity="0.7">
    <ellipse cx="0" cy="3" rx="8" ry="6" fill="#FFD54F"/>
    <circle cx="-5" cy="-2" r="5" fill="#FFD54F"/>
    <circle cx="-7" cy="-3" r="1.2" fill="#333"/>
    <path d="M-10,-1 L-13,0 L-10,1 Z" fill="#FF8F00"/>
    <animateTransform attributeName="transform" type="translate" values="135,175;137,173;135,175" dur="2.5s" repeatCount="indefinite"/>
  </g>

  <!-- Label -->
  <text x="200" y="380" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="bold" fill="#5C4033" opacity="0.5">DUCK NOODLE SOUP</text>
</svg>
