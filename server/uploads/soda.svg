<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
<defs>
<radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#E3F2FD"/><stop offset="100%" stop-color="#7C4DFF"/></radialGradient>
<linearGradient id="cup" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#E040FB"/><stop offset="100%" stop-color="#7C4DFF"/></linearGradient>
</defs>
<circle cx="200" cy="200" r="195" fill="url(#bg)"/>
<!-- Cup body -->
<path d="M130,120 L145,330 L255,330 L270,120 Z" fill="url(#cup)" stroke="#6A1B9A" stroke-width="2"/>
<!-- Cup design stripes -->
<rect x="140" y="180" width="120" height="8" rx="2" fill="#FFEB3B" opacity="0.6"/>
<rect x="142" y="220" width="116" height="8" rx="2" fill="#FFEB3B" opacity="0.6"/>
<rect x="144" y="260" width="112" height="8" rx="2" fill="#FFEB3B" opacity="0.6"/>
<!-- Liquid visible -->
<path d="M135,140 L148,320 L252,320 L265,140 Z" fill="#4FC3F7" opacity="0.4"/>
<!-- Ice cubes -->
<rect x="160" y="170" width="25" height="20" rx="4" fill="#E1F5FE" opacity="0.7" transform="rotate(10,172,180)"/>
<rect x="200" y="200" width="25" height="20" rx="4" fill="#E1F5FE" opacity="0.6" transform="rotate(-5,212,210)"/>
<rect x="175" y="240" width="22" height="18" rx="4" fill="#E1F5FE" opacity="0.7" transform="rotate(8,186,249)"/>
<!-- Bubbles -->
<g fill="#FFF" opacity="0.6">
<circle cx="170" cy="290" r="4"><animate attributeName="cy" values="290;160;290" dur="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/></circle>
<circle cx="195" cy="280" r="3"><animate attributeName="cy" values="280;150;280" dur="3.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0;0.6" dur="3.5s" repeatCount="indefinite"/></circle>
<circle cx="220" cy="300" r="3.5"><animate attributeName="cy" values="300;170;300" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.6;0;0.6" dur="4s" repeatCount="indefinite"/></circle>
<circle cx="185" cy="260" r="2.5"><animate attributeName="cy" values="260;140;260" dur="2.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;0;0.5" dur="2.8s" repeatCount="indefinite"/></circle>
</g>
<!-- Lid -->
<ellipse cx="200" cy="120" rx="72" ry="12" fill="#E1BEE7"/>
<rect x="130" y="110" width="140" height="12" rx="3" fill="#CE93D8"/>
<ellipse cx="200" cy="110" rx="72" ry="12" fill="#E1BEE7"/>
<!-- Straw -->
<rect x="215" y="50" width="8" height="130" rx="2" fill="#F44336" transform="rotate(8,219,115)"/>
<rect x="215" y="50" width="4" height="130" rx="1" fill="#EF5350" opacity="0.5" transform="rotate(8,219,115)"/>
<!-- Label -->
<text x="200" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#4A148C">Soda</text>
</svg>