<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
<defs>
<radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFFDE7"/><stop offset="100%" stop-color="#C8E6C9"/></radialGradient>
</defs>
<circle cx="200" cy="200" r="195" fill="url(#bg)"/>
<!-- Steam -->
<g opacity="0.4">
<path d="M140,100 Q145,80 150,100 Q155,80 160,100" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;0,-15;0,0" dur="2s" repeatCount="indefinite"/></path>
<path d="M200,90 Q205,70 210,90 Q215,70 220,90" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;0,-18;0,0" dur="2.5s" repeatCount="indefinite"/></path>
<path d="M250,100 Q255,80 260,100 Q265,80 270,100" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;0,-12;0,0" dur="1.8s" repeatCount="indefinite"/></path>
</g>
<!-- Bowl -->
<ellipse cx="200" cy="250" rx="145" ry="90" fill="#B8860B"/>
<ellipse cx="200" cy="250" rx="140" ry="85" fill="#DAA520"/>
<!-- Broth (light golden) -->
<ellipse cx="200" cy="230" rx="130" ry="70" fill="#FFEEB5"/>
<!-- Noodles -->
<g stroke="#F0DC82" stroke-width="3" fill="none" opacity="0.6">
<path d="M120,230 Q150,215 180,230 Q210,245 240,230 Q270,215 300,230"/>
<path d="M110,240 Q140,225 170,240 Q200,255 230,240 Q260,225 290,240"/>
</g>
<!-- Wontons -->
<g fill="#F5DEB3" stroke="#DAA520" stroke-width="1.5">
<path d="M140,205 L155,195 L170,205 L155,215 Z"/><path d="M148,200 Q155,192 162,200" fill="none"/>
<path d="M200,200 L215,190 L230,200 L215,210 Z"/><path d="M208,195 Q215,187 222,195" fill="none"/>
<path d="M260,208 L275,198 L290,208 L275,218 Z"/><path d="M268,203 Q275,195 282,203" fill="none"/>
</g>
<!-- Bean sprouts -->
<g stroke="#F5F5DC" stroke-width="2" fill="none">
<path d="M125,220 Q130,215 135,220"/><path d="M270,225 Q275,220 280,225"/>
</g>
<!-- Broccoli -->
<circle cx="130" cy="200" r="8" fill="#2E7D32"/><circle cx="122" cy="196" r="6" fill="#388E3C"/><circle cx="138" cy="196" r="6" fill="#388E3C"/><rect x="128" y="205" width="4" height="6" fill="#5D4037"/>
<!-- Carrots -->
<circle cx="175" cy="215" r="5" fill="#FF8C00"/><circle cx="185" cy="218" r="4" fill="#FF8C00"/>
<!-- Napa cabbage -->
<ellipse cx="240" cy="195" rx="10" ry="15" fill="#C8E6C9" stroke="#81C784" stroke-width="1"/>
<!-- Fried garlic dots -->
<circle cx="155" cy="225" r="2.5" fill="#DAA520"/><circle cx="220" cy="220" r="2.5" fill="#DAA520"/><circle cx="250" cy="228" r="2" fill="#DAA520"/>
<!-- Scallion -->
<circle cx="300" cy="205" r="4" fill="#4CAF50"/><circle cx="295" cy="210" r="3" fill="#66BB6A"/>
<!-- Cilantro -->
<path d="M110,210 Q115,205 112,200 M112,210 Q117,206 114,201 M114,212 Q119,207 116,202" stroke="#43A047" stroke-width="1.5" fill="none"/>
<!-- Bowl rim -->
<ellipse cx="200" cy="180" rx="140" ry="30" fill="none" stroke="#B8860B" stroke-width="6"/>
<!-- Chopsticks -->
<line x1="280" y1="140" x2="340" y2="100" stroke="#C4873B" stroke-width="5" stroke-linecap="round"/>
<line x1="290" y1="145" x2="350" y2="105" stroke="#A0704B" stroke-width="5" stroke-linecap="round"/>
<!-- Label -->
<text x="200" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#5D4037">Wonton Ramen</text>
</svg>