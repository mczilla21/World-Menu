<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF5E6"/>
      <stop offset="100%" stop-color="#FFE4B5"/>
    </linearGradient>
    <linearGradient id="bowl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A855"/>
      <stop offset="100%" stop-color="#A67C3D"/>
    </linearGradient>
    <linearGradient id="broth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8B84D"/>
      <stop offset="100%" stop-color="#C4942A"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C872"/>
      <stop offset="100%" stop-color="#B8923D"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bg)"/>

  <!-- Steam wisps -->
  <g opacity="0.3">
    <path d="M140,120 Q145,100 140,80 Q135,60 140,40" stroke="#C4942A" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M140,120 Q145,100 140,80 Q135,60 140,40;M140,120 Q135,95 140,75 Q145,55 140,35;M140,120 Q145,100 140,80 Q135,60 140,40" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M200,110 Q205,85 200,65 Q195,45 200,25" stroke="#C4942A" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M200,110 Q205,85 200,65 Q195,45 200,25;M200,110 Q195,80 200,60 Q205,40 200,20;M200,110 Q205,85 200,65 Q195,45 200,25" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M260,120 Q265,100 260,80 Q255,60 260,40" stroke="#C4942A" stroke-width="3" fill="none" stroke-linecap="round">
      <animate attributeName="d" values="M260,120 Q265,100 260,80 Q255,60 260,40;M260,120 Q255,95 260,75 Q265,55 260,35;M260,120 Q265,100 260,80 Q255,60 260,40" dur="3.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Bowl body -->
  <path d="M80,180 Q80,320 200,340 Q320,320 320,180 Z" fill="url(#bowl)" stroke="#8B6914" stroke-width="2"/>

  <!-- Broth -->
  <path d="M90,180 Q90,300 200,315 Q310,300 310,180 Z" fill="url(#broth)" opacity="0.7"/>

  <!-- Broth wave -->
  <path d="M90,180 Q130,170 170,180 Q210,190 250,180 Q290,170 310,180" fill="none" stroke="#D4A855" stroke-width="2" opacity="0.5">
    <animate attributeName="d" values="M90,180 Q130,170 170,180 Q210,190 250,180 Q290,170 310,180;M90,180 Q130,190 170,180 Q210,170 250,180 Q290,190 310,180;M90,180 Q130,170 170,180 Q210,190 250,180 Q290,170 310,180" dur="2s" repeatCount="indefinite"/>
  </path>

  <!-- Noodles -->
  <g stroke="#F5DEB3" fill="none" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <path d="M120,200 Q160,190 200,200 Q240,210 280,200">
      <animate attributeName="d" values="M120,200 Q160,190 200,200 Q240,210 280,200;M120,200 Q160,210 200,200 Q240,190 280,200;M120,200 Q160,190 200,200 Q240,210 280,200" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M130,215 Q170,205 210,215 Q250,225 290,215"/>
    <path d="M115,230 Q155,220 195,230 Q235,240 275,230"/>
    <path d="M125,245 Q165,235 205,245 Q245,255 285,245"/>
  </g>

  <!-- Egg (half) -->
  <ellipse cx="160" cy="175" rx="22" ry="18" fill="#FFFFFF" stroke="#E8C872" stroke-width="1.5"/>
  <ellipse cx="160" cy="175" rx="12" ry="10" fill="#FFB833"/>

  <!-- Shrimp -->
  <g transform="translate(240,165) rotate(-20)">
    <path d="M0,0 Q10,-12 20,-8 Q25,-4 20,2 Q15,8 5,5 Z" fill="#FF8C6B" stroke="#E06030" stroke-width="1"/>
    <line x1="20" y1="-6" x2="28" y2="-10" stroke="#E06030" stroke-width="1"/>
    <line x1="20" y1="-3" x2="27" y2="-5" stroke="#E06030" stroke-width="1"/>
  </g>

  <!-- Green onion pieces -->
  <circle cx="185" cy="168" r="4" fill="#4CAF50" opacity="0.8"/>
  <circle cx="220" cy="172" r="3" fill="#66BB6A" opacity="0.8"/>
  <circle cx="145" cy="185" r="3" fill="#4CAF50" opacity="0.7"/>
  <circle cx="255" cy="178" r="3.5" fill="#81C784" opacity="0.8"/>

  <!-- Cilantro leaf -->
  <g transform="translate(200,160)">
    <path d="M0,0 Q-5,-8 -2,-14 Q0,-10 2,-14 Q5,-8 0,0" fill="#2E7D32" opacity="0.7"/>
  </g>

  <!-- Bowl rim -->
  <ellipse cx="200" cy="180" rx="125" ry="18" fill="url(#rim)" stroke="#8B6914" stroke-width="1.5"/>

  <!-- Chopsticks -->
  <g transform="translate(270,100) rotate(25)">
    <rect x="0" y="0" width="5" height="120" rx="2" fill="#8B4513" opacity="0.9"/>
    <rect x="0" y="0" width="5" height="30" rx="2" fill="#D2691E"/>
  </g>
  <g transform="translate(285,105) rotate(30)">
    <rect x="0" y="0" width="5" height="120" rx="2" fill="#8B4513" opacity="0.9"/>
    <rect x="0" y="0" width="5" height="30" rx="2" fill="#D2691E"/>
  </g>

  <!-- Sparkles (building animation) -->
  <g>
    <text x="100" y="140" font-size="18" opacity="0.6">✨</text>
    <text x="280" y="130" font-size="14" opacity="0.5">✨</text>
    <text x="320" y="200" font-size="16" opacity="0.4">✨</text>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-5;0,0" dur="1.5s" repeatCount="indefinite"/>
  </g>

  <!-- "Build" text arc -->
  <text x="200" y="375" text-anchor="middle" font-family="system-ui" font-size="16" font-weight="bold" fill="#A67C3D" opacity="0.5">BUILD YOUR BOWL</text>
</svg>
