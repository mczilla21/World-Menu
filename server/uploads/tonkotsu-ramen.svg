<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
<defs>
<radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFFDF5"/><stop offset="100%" stop-color="#E8D5B7"/></radialGradient>
</defs>
<circle cx="200" cy="200" r="195" fill="url(#bg)"/>
<!-- Steam -->
<g opacity="0.4">
<path d="M140,100 Q145,80 150,100 Q155,80 160,100" fill="none" stroke="#ccc" stroke-width="3" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;0,-15;0,0" dur="2s" repeatCount="indefinite"/></path>
<path d="M200,90 Q205,70 210,90 Q215,70 220,90" fill="none" stroke="#ccc" stroke-width="3" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;0,-18;0,0" dur="2.5s" repeatCount="indefinite"/></path>
<path d="M250,100 Q255,80 260,100 Q265,80 270,100" fill="none" stroke="#ccc" stroke-width="3" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;0,-12;0,0" dur="1.8s" repeatCount="indefinite"/></path>
</g>
<!-- Bowl -->
<ellipse cx="200" cy="250" rx="145" ry="90" fill="#C4A882"/>
<ellipse cx="200" cy="250" rx="140" ry="85" fill="#D4B892"/>
<!-- Broth (creamy white) -->
<ellipse cx="200" cy="230" rx="130" ry="70" fill="#FFF5E1"/>
<!-- Noodles -->
<g stroke="#F0DC82" stroke-width="3" fill="none" opacity="0.6">
<path d="M120,230 Q150,215 180,230 Q210,245 240,230 Q270,215 300,230"/>
<path d="M110,240 Q140,225 170,240 Q200,255 230,240 Q260,225 290,240"/>
</g>
<!-- Chashu -->
<circle cx="155" cy="210" r="22" fill="#8B5E3C"/><circle cx="155" cy="210" r="16" fill="#A0704B" opacity="0.7"/>
<circle cx="205" cy="200" r="20" fill="#8B5E3C"/><circle cx="205" cy="200" r="14" fill="#A0704B" opacity="0.7"/>
<!-- Egg -->
<ellipse cx="265" cy="210" rx="20" ry="16" fill="#FFF"/><ellipse cx="265" cy="210" rx="12" ry="9" fill="#FFD700"/>
<!-- Fish cake -->
<circle cx="130" cy="200" r="14" fill="#FFD1DC"/><path d="M123,200 Q130,190 137,200" fill="none" stroke="#E75480" stroke-width="2"/>
<!-- Black mushrooms (kikurage) -->
<ellipse cx="240" cy="200" rx="12" ry="8" fill="#3E2723"/><ellipse cx="255" cy="205" rx="10" ry="7" fill="#4E342E"/>
<!-- Seaweed -->
<rect x="170" y="185" width="25" height="35" rx="3" fill="#1B4332" opacity="0.85"/>
<!-- Green onion -->
<circle cx="290" cy="200" r="4" fill="#4CAF50"/><circle cx="298" cy="205" r="3" fill="#4CAF50"/><circle cx="285" cy="207" r="3" fill="#4CAF50"/>
<!-- Bowl rim -->
<ellipse cx="200" cy="180" rx="140" ry="30" fill="none" stroke="#C4A882" stroke-width="6"/>
<!-- Chopsticks -->
<line x1="280" y1="140" x2="340" y2="100" stroke="#C4873B" stroke-width="5" stroke-linecap="round"/>
<line x1="290" y1="145" x2="350" y2="105" stroke="#A0704B" stroke-width="5" stroke-linecap="round"/>
<!-- Label -->
<text x="200" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#8B6914">Tonkotsu Ramen</text>
</svg>