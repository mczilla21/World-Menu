<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
<defs>
<radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFF3D6"/><stop offset="100%" stop-color="#F5A623"/></radialGradient>
</defs>
<circle cx="200" cy="200" r="195" fill="url(#bg)"/>
<!-- Steam -->
<g opacity="0.5">
<path d="M140,100 Q145,80 150,100 Q155,80 160,100" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;0,-15;0,0" dur="2s" repeatCount="indefinite"/></path>
<path d="M200,90 Q205,70 210,90 Q215,70 220,90" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;0,-18;0,0" dur="2.5s" repeatCount="indefinite"/></path>
<path d="M250,100 Q255,80 260,100 Q265,80 270,100" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;0,-12;0,0" dur="1.8s" repeatCount="indefinite"/></path>
</g>
<!-- Bowl -->
<ellipse cx="200" cy="250" rx="145" ry="90" fill="#E8700A"/>
<ellipse cx="200" cy="250" rx="140" ry="85" fill="#F5A623"/>
<!-- Broth -->
<ellipse cx="200" cy="230" rx="130" ry="70" fill="#F7C948"/>
<!-- Noodles -->
<g stroke="#F0DC82" stroke-width="3" fill="none" opacity="0.7">
<path d="M120,230 Q150,215 180,230 Q210,245 240,230 Q270,215 300,230"/>
<path d="M110,240 Q140,225 170,240 Q200,255 230,240 Q260,225 290,240"/>
</g>
<!-- Chashu pork -->
<circle cx="150" cy="210" r="22" fill="#8B5E3C"/><circle cx="150" cy="210" r="16" fill="#A0704B" opacity="0.7"/>
<circle cx="200" cy="200" r="22" fill="#8B5E3C"/><circle cx="200" cy="200" r="16" fill="#A0704B" opacity="0.7"/>
<!-- Egg -->
<ellipse cx="260" cy="210" rx="20" ry="16" fill="#FFF"/><ellipse cx="260" cy="210" rx="12" ry="9" fill="#FFD700"/>
<!-- Fish cake -->
<circle cx="290" cy="195" r="14" fill="#FFD1DC"/><path d="M283,195 Q290,185 297,195" fill="none" stroke="#E75480" stroke-width="2"/>
<!-- Mushrooms -->
<ellipse cx="130" cy="195" rx="10" ry="6" fill="#8B6914"/><rect x="128" y="195" width="4" height="8" fill="#C4A35A"/>
<!-- Corn -->
<circle cx="170" cy="195" r="4" fill="#FFE135"/><circle cx="180" cy="192" r="4" fill="#FFE135"/><circle cx="175" cy="200" r="4" fill="#FFE135"/>
<!-- Seaweed -->
<rect x="220" y="185" width="25" height="35" rx="3" fill="#1B4332" opacity="0.85"/>
<!-- Green onion -->
<circle cx="240" cy="195" r="4" fill="#4CAF50"/><circle cx="248" cy="200" r="3" fill="#4CAF50"/><circle cx="235" cy="202" r="3" fill="#4CAF50"/>
<!-- Bowl rim -->
<ellipse cx="200" cy="180" rx="140" ry="30" fill="none" stroke="#E8700A" stroke-width="6"/>
<!-- Chopsticks -->
<line x1="280" y1="140" x2="340" y2="100" stroke="#C4873B" stroke-width="5" stroke-linecap="round"/>
<line x1="290" y1="145" x2="350" y2="105" stroke="#A0704B" stroke-width="5" stroke-linecap="round"/>
<!-- Label -->
<text x="200" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#8B4513">Miso Ramen</text>
</svg>