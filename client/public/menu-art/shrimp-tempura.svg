<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
<defs>
<radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFFDE7"/><stop offset="100%" stop-color="#FFE082"/></radialGradient>
</defs>
<circle cx="200" cy="200" r="195" fill="url(#bg)"/>
<!-- Plate -->
<ellipse cx="200" cy="300" rx="140" ry="35" fill="#BDBDBD"/>
<ellipse cx="200" cy="295" rx="140" ry="35" fill="#EEEEEE"/>
<!-- Paper -->
<rect x="100" y="200" width="200" height="100" rx="5" fill="#FFFDE7" opacity="0.5"/>
<!-- Shrimp 1 -->
<path d="M130,280 Q125,230 135,180 Q140,160 150,150" fill="none" stroke="#DAA520" stroke-width="18" stroke-linecap="round"/>
<path d="M130,280 Q125,230 135,180 Q140,160 150,150" fill="none" stroke="#EDBA3A" stroke-width="12" stroke-linecap="round"/>
<circle cx="150" cy="148" r="8" fill="#FF8A65"/>
<path d="M148,140 L155,132 M152,140 L158,133" stroke="#FF7043" stroke-width="2"/>
<!-- Shrimp 2 -->
<path d="M195,285 Q190,235 198,185 Q202,165 210,155" fill="none" stroke="#DAA520" stroke-width="18" stroke-linecap="round"/>
<path d="M195,285 Q190,235 198,185 Q202,165 210,155" fill="none" stroke="#EDBA3A" stroke-width="12" stroke-linecap="round"/>
<circle cx="210" cy="153" r="8" fill="#FF8A65"/>
<path d="M208,145 L215,137 M212,145 L218,138" stroke="#FF7043" stroke-width="2"/>
<!-- Shrimp 3 -->
<path d="M260,282 Q258,232 262,185 Q265,168 272,158" fill="none" stroke="#DAA520" stroke-width="18" stroke-linecap="round"/>
<path d="M260,282 Q258,232 262,185 Q265,168 272,158" fill="none" stroke="#EDBA3A" stroke-width="12" stroke-linecap="round"/>
<circle cx="272" cy="156" r="8" fill="#FF8A65"/>
<path d="M270,148 L277,140 M274,148 L280,141" stroke="#FF7043" stroke-width="2"/>
<!-- Tempura batter texture -->
<g fill="#C49B20" opacity="0.3">
<circle cx="128" cy="250" r="3"/><circle cx="135" cy="220" r="2.5"/><circle cx="130" cy="200" r="2"/>
<circle cx="193" cy="255" r="3"/><circle cx="196" cy="225" r="2.5"/><circle cx="198" cy="200" r="2"/>
<circle cx="258" cy="252" r="3"/><circle cx="261" cy="222" r="2.5"/>
</g>
<!-- Dipping sauce -->
<ellipse cx="80" cy="280" rx="30" ry="10" fill="#5D4037"/>
<ellipse cx="80" cy="277" rx="30" ry="10" fill="#6D4C41"/>
<ellipse cx="80" cy="274" rx="26" ry="8" fill="#8D6914"/>
<!-- Sparkle -->
<g fill="#FFD700" opacity="0.7">
<polygon points="320,130 322,136 328,136 323,140 325,146 320,142 315,146 317,140 312,136 318,136">
<animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.5s" repeatCount="indefinite"/>
</polygon>
</g>
<!-- Label -->
<text x="200" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="19" font-weight="bold" fill="#E6A100">Shrimp Tempura</text>
</svg>