<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
<defs>
<radialGradient id="bg" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#FFD6D6"/><stop offset="100%" stop-color="#E53935"/></radialGradient>
</defs>
<circle cx="200" cy="200" r="195" fill="url(#bg)"/>
<!-- Steam (aggressive) -->
<g opacity="0.6">
<path d="M130,95 Q138,65 146,95 Q154,65 162,95" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;-5,-20;0,0" dur="1.5s" repeatCount="indefinite"/></path>
<path d="M190,85 Q198,50 206,85 Q214,50 222,85" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;0,-22;0,0" dur="1.8s" repeatCount="indefinite"/></path>
<path d="M250,95 Q258,65 266,95 Q274,65 282,95" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round">
<animateTransform attributeName="transform" type="translate" values="0,0;5,-20;0,0" dur="1.6s" repeatCount="indefinite"/></path>
</g>
<!-- Bowl -->
<ellipse cx="200" cy="250" rx="145" ry="90" fill="#B71C1C"/>
<ellipse cx="200" cy="250" rx="140" ry="85" fill="#D32F2F"/>
<!-- Broth -->
<ellipse cx="200" cy="230" rx="130" ry="70" fill="#FF5722"/>
<!-- Chili oil swirls -->
<circle cx="160" cy="240" r="8" fill="#B71C1C" opacity="0.4"/><circle cx="230" cy="235" r="10" fill="#B71C1C" opacity="0.3"/>
<!-- Noodles -->
<g stroke="#F0DC82" stroke-width="3" fill="none" opacity="0.7">
<path d="M120,230 Q150,215 180,230 Q210,245 240,230 Q270,215 300,230"/>
<path d="M110,240 Q140,225 170,240 Q200,255 230,240 Q260,225 290,240"/>
</g>
<!-- Chashu -->
<circle cx="150" cy="210" r="22" fill="#8B5E3C"/><circle cx="150" cy="210" r="16" fill="#A0704B" opacity="0.7"/>
<circle cx="200" cy="200" r="22" fill="#8B5E3C"/><circle cx="200" cy="200" r="16" fill="#A0704B" opacity="0.7"/>
<!-- Egg -->
<ellipse cx="260" cy="210" rx="20" ry="16" fill="#FFF"/><ellipse cx="260" cy="210" rx="12" ry="9" fill="#FFD700"/>
<!-- Fish cake -->
<circle cx="290" cy="195" r="14" fill="#FFD1DC"/><path d="M283,195 Q290,185 297,195" fill="none" stroke="#E75480" stroke-width="2"/>
<!-- Chili peppers -->
<g fill="#D50000">
<ellipse cx="125" cy="200" rx="12" ry="5" transform="rotate(-20,125,200)"/><line x1="113" y1="198" x2="108" y2="195" stroke="#2E7D32" stroke-width="2"/>
<ellipse cx="310" cy="210" rx="12" ry="5" transform="rotate(15,310,210)"/><line x1="322" y1="208" x2="327" y2="205" stroke="#2E7D32" stroke-width="2"/>
</g>
<!-- Seaweed -->
<rect x="220" y="185" width="25" height="35" rx="3" fill="#1B4332" opacity="0.85"/>
<!-- Green onion -->
<circle cx="240" cy="195" r="4" fill="#4CAF50"/><circle cx="248" cy="200" r="3" fill="#4CAF50"/>
<!-- Corn -->
<circle cx="170" cy="195" r="4" fill="#FFE135"/><circle cx="180" cy="192" r="4" fill="#FFE135"/>
<!-- Bowl rim -->
<ellipse cx="200" cy="180" rx="140" ry="30" fill="none" stroke="#B71C1C" stroke-width="6"/>
<!-- Chopsticks -->
<line x1="280" y1="140" x2="340" y2="100" stroke="#C4873B" stroke-width="5" stroke-linecap="round"/>
<line x1="290" y1="145" x2="350" y2="105" stroke="#A0704B" stroke-width="5" stroke-linecap="round"/>
<!-- Label -->
<text x="200" y="370" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#B71C1C">Spicy Miso Ramen</text>
</svg>